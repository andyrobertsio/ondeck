name = "default"

# The blue palette — overrides base's neutral token contract. Structural tokens
# (frame, stage size, fonts, pad, transition feel) are inherited from base.
[tokens]
bg       = "#0d1017"
bg-2     = "#131722"
fg       = "#e6e8ee"
muted    = "#9aa5ce"
accent   = "#7aa2f7"
accent-2 = "#bb9af7"
rule     = "#232838"

# `default` is the built-in baseline, compiled into the binary. It defines the
# engine's layout vocabulary as data (below); its look lives in `theme.css` and
# the engine machinery in `base.css`, both alongside this file. Every other theme
# inherits all of it and overrides only what it names.
#
# Most layouts are a single editable `body` block (loose Markdown flows into it);
# multi-block layouts list each block. A block is editable unless a theme gives
# it `image`/`text`. `at` = "x{c1} y{r1} x{c2} y{r2}", 1-indexed inclusive cells
# on the 64×36 grid (30×30px square cells over the 16:9 stage).
# (`free` is intentionally absent — its blocks are author-placed via `:::block at=`.)

[layout.title.blocks]
body = { at = "x7 y11 x56 y26" }

[layout.section.blocks]
body = { at = "x7 y13 x58 y24", align-x = "center", align-y = "center" }

[layout.bullets.blocks]
body = { at = "x7 y5 x58 y32" }

# lede: a heading + body in a logical column — a long title grows and pushes the
# body down instead of clipping (a short one is identical to a fixed grid).
[layout.lede.blocks]
head = { at = "x7 y6 x44 y14", column = "main", expandable-y = true }
body = { at = "x7 y15 x44 y31", column = "main", fill = true }

[layout.statement.blocks]
body = { at = "x9 y9 x56 y28", align-x = "center", align-y = "center" }

[layout.code.blocks]
body = { at = "x7 y5 x58 y32" }

[layout.table.blocks]
body = { at = "x5 y5 x60 y32" }

[layout.quote.blocks]
body = { at = "x9 y9 x56 y24", align-y = "center" }
cite = { at = "x9 y25 x56 y30" }

[layout.two-col.blocks]
head  = { at = "x7 y5 x58 y10", align-y = "bottom" }
left  = { at = "x7 y13 x30 y32" }
right = { at = "x35 y13 x58 y32" }

[layout.compare.blocks]
head  = { at = "x7 y5 x58 y10", align-x = "center", align-y = "bottom" }
left  = { at = "x7 y13 x30 y32" }
right = { at = "x35 y13 x58 y32" }

# media-split: a cover image one side (full-bleed), text the other. `media: right`
# mirrors the columns at render time.
[layout.media-split.blocks]
media = { at = "x1 y1 x32 y36", fit = "cover" }
body  = { at = "x37 y7 x60 y30" }

# panel: a colour rail painted from `background-color` alone — a block of colour,
# no SVG. The rail still renders with no content, and (being painted) is excluded
# from the loose-Markdown sink, so `body` takes the slide; address `:::rail` to
# lay a label over the fill.
[layout.panel.blocks]
rail = { at = "x1 y1 x22 y36", background-color = "var(--accent)", align-y = "bottom" }
body = { at = "x28 y8 x59 y30" }

# stat: a heading and a repeatable figure that flows right, centred so partial
# counts sit in the middle.
[layout.stat.blocks]
head   = { at = "x7 y5 x58 y10", align-y = "bottom" }
figure = { at = "x7 y13 x18 y26", align-x = "center", repeatable = true, repeatable-direction = "right", repeatable-margin = 2, repeatable-limit = 4, repeatable-align = "center" }

# image / raw fill the whole stage and render outside the grid.
[layout.image.blocks]
body = { at = "x1 y1 x64 y36", fit = "cover" }

[layout.raw.blocks]
body = { at = "x1 y1 x64 y36" }
