name = "midnight"

# midnight is the default look — it inherits everything from the engine's
# base stylesheet (base.css) and default layouts. Nothing else is needed.
#
# A theme overrides selectively, e.g.:
#   [grid]
#   cols = 24
#   rows = 16
#   [tokens]            # emitted as CSS vars (--accent, …); override base
#   accent = "#ff5470"
#   [layout.bullets]    # override a default layout's slot rectangles
#   body = "x4 y3 x27 y18"
