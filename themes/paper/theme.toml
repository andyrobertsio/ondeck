name = "paper"
extends = "default"

# A light, editorial theme. It inherits the core layouts + default styling from
# the `default` theme (and the engine look from base), overriding only tokens +
# a few rules (theme.css).
[tokens]
bg = "#faf7f0"
bg-2 = "#ece5d8"
fg = "#1f1b16"
muted = "#7a7268"
accent = "#b4341c"
accent-2 = "#1c6b5a"
rule = "#d9cfbe"
font = 'Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif'
